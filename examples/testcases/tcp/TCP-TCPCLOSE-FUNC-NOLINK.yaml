name: TCPCLOSE-未建链业务码(严格字节级)
description: |
  场景前提：无卡无网，无 TCP 链路。
  验证目标：AT+TCPCLOSE=0 关闭不存在的链路 → 业务码 +TCPCLOSE: ERROR（必加 timeout）。
  文档依据：据 ch06 §6.8，坏链路号返回 \r\n+TCPCLOSE: ERROR\r\n（业务码）。
tags: [TCP, TCPCLOSE, FUNC, p0]
port: COM5

setup:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

steps:
  # 6.8 TCPCLOSE 未建链业务码（业务码不终结，timeout 兜底）
  - command: 'AT+TCPCLOSE=0'
    timeout: 1.2
    assert:
      - { name: TCPCLOSE业务ERROR严格, matches: '^\r\n\+TCPCLOSE: ERROR\r\n$' }

teardown:
  - command: ATE0
