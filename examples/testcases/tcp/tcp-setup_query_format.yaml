name: TCP/UDP参数与状态查询-响应格式(严格字节级)
description: |
  ch06 TCP/UDP 客户端指令响应格式严格验证（无卡无网场景）。
  严格到回车换行数量与空格数量：正则用 ^...$ 锚定整段响应，\r\n 显式出现，
  空格用字面空格（非 \s），确保格式精确匹配。
  探测依据（N58-R07-STD-OE_V20_MEITUAN-00F, 精确 hex 捕获）：
    AT+NETAPN?   响应 = \r\n+NETAPN: "CMNET","",""\r\nOK\r\n
    AT+XIIC?     响应 = \r\n+XIIC:    0,0.0.0.0\r\nOK\r\n   （冒号后4个空格，右对齐填充）
    AT+RECVMODE? 响应 = \r\n+RECVMODE: 1,1\r\nOK\r\n
    AT+RECVMODE=?响应 = \r\n+RECVMODE: (0-1),(0-1)\r\nOK\r\n
    AT+DNSSERVER?响应 = \r\n+DNSSERVER: <0x02等内部二进制>\r\nOK\r\n （值非文本，仅校验骨架）
    AT+PDPKEEPALIVE? 响应 = \r\n+PDPKEEPALIVE: 1,60\r\nOK\r\n
    AT+TCPKEEPALIVE? 响应 = \r\n+TCPKEEPALIVE: 0,120,75,9\r\nOK\r\n
    AT+TCPKEEPALIVE=?响应 = \r\n+TCPKEEPALIVE: (0-1),(30-7200),(1-1800),(1-15)\r\nOK\r\n
  规律：所有数据行格式为 \r\n+CMD:<空格><value>\r\n，XIIC 例外（4空格右对齐）。
tags: [tcp, format, strict, p0]
port: COM5

setup:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }
  - command: AT
    assert: { matches: '^\r\nOK\r\n$' }
    retry: { count: 2, interval: 500 }

steps:
  # 6.1 NETAPN 查询 —— 冒号后恰好1空格
  - command: 'AT+NETAPN?'
    extract:
      apn: '\+NETAPN:\s*"([^"]*)"'
    assert:
      - { name: NETAPN严格格式, matches: '^\r\n\+NETAPN: "[^"]*","[^"]*","[^"]*"\r\nOK\r\n$' }
      - { name: apn变量已提取, var: apn, op: matches, value: '.+' }

  # 6.2 XIIC 查询 —— 冒号后恰好4个空格（右对齐填充），state<逗号><ip>
  - command: 'AT+XIIC?'
    extract:
      xiic_state: '\+XIIC:\s*(\d+)'
      xiic_ip: '\+XIIC:\s*\d+,\s*([\d.]+)'
    assert:
      - { name: XIIC严格格式4空格, matches: '^\r\n\+XIIC:    \d+,[\d.]+\r\nOK\r\n$' }
      - { name: XIIC无网state为0, var: xiic_state, op: eq, value: "0" }

  # 6.5 RECVMODE 查询 —— 冒号后恰好1空格，n<逗号>mode
  - command: 'AT+RECVMODE?'
    extract:
      recv_n: '\+RECVMODE:\s*(\d)'
      recv_mode: '\+RECVMODE:\s*\d+,(\d)'
    assert:
      - { name: RECVMODE严格格式, matches: '^\r\n\+RECVMODE: \d+,\d+\r\nOK\r\n$' }
      - { name: n在0-1, var: recv_n, op: in, values: ["0", "1"] }
      - { name: mode在0-1, var: recv_mode, op: in, values: ["0", "1"] }

  # 6.5 RECVMODE 测试命令 —— 冒号后1空格 + (0-1),(0-1)
  - command: 'AT+RECVMODE=?'
    assert:
      - { name: RECVMODE测试严格格式, matches: '^\r\n\+RECVMODE: \(0-1\),\(0-1\)\r\nOK\r\n$' }

  # 6.16 DNSSERVER 查询 —— 值为模组内部二进制状态（含 0x02 等控制字符，
  # 文档未定义其文本格式，且随设置状态变化），故不纳入严格字节断言，
  # 仅校验 +DNSSERVER: 前缀 + OK 结尾的骨架结构。
  - command: 'AT+DNSSERVER?'
    assert:
      - { name: DNSSERVER前缀与OK结尾, matches: '^\r\n\+DNSSERVER: .*\r\nOK\r\n$' }

  # 6.17 PDPKEEPALIVE 查询 —— 冒号后1空格，onoff<逗号>interval
  - command: 'AT+PDPKEEPALIVE?'
    extract:
      ka_onoff: '\+PDPKEEPALIVE:\s*(\d+)'
    assert:
      - { name: PDPKEEPALIVE严格格式, matches: '^\r\n\+PDPKEEPALIVE: \d+,\d+\r\nOK\r\n$' }
      - { name: onoff在0-1, var: ka_onoff, op: in, values: ["0", "1"] }

  # 6.19 TCPKEEPALIVE 查询 —— 冒号后1空格，4个数值逗号分隔
  - command: 'AT+TCPKEEPALIVE?'
    extract:
      tka_mode: '\+TCPKEEPALIVE:\s*(\d+)'
      tka_time: '\+TCPKEEPALIVE:\s*\d+,(\d+)'
    assert:
      - { name: TCPKEEPALIVE严格格式, matches: '^\r\n\+TCPKEEPALIVE: \d+,\d+,\d+,\d+\r\nOK\r\n$' }
      - { name: mode在0-1, var: tka_mode, op: in, values: ["0", "1"] }

  # 6.19 TCPKEEPALIVE 测试命令 —— 四元取值范围
  - command: 'AT+TCPKEEPALIVE=?'
    assert:
      - { name: TCPKEEPALIVE测试严格格式, matches: '^\r\n\+TCPKEEPALIVE: \(0-1\),\(30-7200\),\(1-1800\),\(1-15\)\r\nOK\r\n$' }

teardown:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }
