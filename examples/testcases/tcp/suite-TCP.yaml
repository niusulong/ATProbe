name: TCP/UDP客户端指令测试套件
description: |
  ch06 TCP/UDP 客户端指令端到端测试集合（N58 COM5，无卡无网场景）。
  覆盖三类验证（按新命名规范 4 段全大写，单一职责）：
    1. RESP 响应格式（查询/测试命令的 +CMD: <value> 字节格式）
    2. PARA 参数与边界（合法设置 OK / 格式错误拒绝）
    3. FUNC 功能验证（未建链业务码）+ CMDPARSE 指令识别
tags: [TCP, regression]

cases:
  # RESP 类
  - TCP-NETAPN-RESP-QUERY_FORMAT.yaml
  - TCP-XIIC-RESP-QUERY_FORMAT.yaml
  - TCP-RECVMODE-RESP-QUERY_FORMAT.yaml
  - TCP-RECVMODE-RESP-TEST_RANGE.yaml
  - TCP-DNSSERVER-RESP-QUERY_FORMAT.yaml
  - TCP-PDPKEEPALIVE-RESP-QUERY_FORMAT.yaml
  - TCP-TCPKEEPALIVE-RESP-QUERY_FORMAT.yaml
  - TCP-TCPKEEPALIVE-RESP-TEST_RANGE.yaml
  # PARA 类
  - TCP-NETAPN-PARA-VALID_APN.yaml
  - TCP-NETAPN-PARA-WRONG_FORMAT_UNQUOTED.yaml
  - TCP-RECVMODE-PARA-VALID_DEFAULT.yaml
  - TCP-RECVMODE-PARA-VALID_HEX_MODE.yaml
  - TCP-XIIC-PARA-VALID_ACTIVATE.yaml
  - TCP-DNSSERVER-PARA-VALID_PRIMARY.yaml
  - TCP-PDPKEEPALIVE-PARA-VALID_DEFAULT.yaml
  - TCP-TCPKEEPALIVE-PARA-VALID_FULL.yaml
  # FUNC 类
  - TCP-TCPSETUP-FUNC-NOLINK.yaml
  - TCP-TCPSEND-FUNC-NOLINK.yaml
  - TCP-TCPCLOSE-FUNC-NOLINK.yaml
  - TCP-IPSTATUS-FUNC-QUERY_DISCONNECT.yaml
  - TCP-UDPSETUP-FUNC-NOLINK.yaml
  - TCP-UDPCLOSE-FUNC-NOLINK.yaml
  - TCP-PDPSTATUS-FUNC-QUERY_STATE.yaml
  - TCP-TCPACK-FUNC-NOLINK.yaml
  # 功能块级
  - TCP-CMDPARSE-FUNC-INVALID_NAME.yaml
