name: TCP/UDP客户端指令测试套件
description: |
  ch06 TCP/UDP 客户端指令端到端测试集合（N58 COM5，无卡无网场景）。
  覆盖三类验证：
    1. 响应格式（查询/测试命令的 +CMD: <value> 格式）
    2. 参数边界（正常设置 OK / 越界 +CME ERROR: 53）
    3. 链路操作业务码（未建链 +CMD: ERROR）与指令识别错误码（+CME ERROR: 58）
tags: [tcp, regression]

cases:
  - tcp-setup_query_format.yaml
  - tcp-param_boundary.yaml
  - tcp-link_ops_nolink.yaml
  - tcp-invalid_command.yaml
