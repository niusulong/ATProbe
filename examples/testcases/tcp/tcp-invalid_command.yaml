name: TCP/UDP指令-未识别与不完整指令错误码(严格字节级)
description: |
  ch06 指令格式错误（不完整/未识别）的错误码严格验证。
  规律：指令前缀拼错或不完整 → 精确 \r\n+CME ERROR: 58\r\n（冒号后1空格）。
  探测依据（精确 hex 捕获）：
    AT+TCPSET=0,1.2.3.4,80   → \r\n+CME ERROR: 58\r\n   （指令名不完整）
    AT+IPSTATU                → \r\n+CME ERROR: 58\r\n   （指令名不完整）
    AT+PDPSTATUS              → \r\n+PDPSTATUS: DISCONNECT\r\n （业务码状态）
  对比 tcp-param_boundary.yaml 中参数越界用 +CME ERROR: 53，可区分两类错误。
tags: [tcp, boundary, errorcode, strict, p1]
port: COM5

setup:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

steps:
  # 指令名不完整（TCPSET≠TCPSETUP）→ 精确 \r\n+CME ERROR: 58\r\n
  - command: 'AT+TCPSET=0,1.2.3.4,80'
    assert:
      - { name: TCPSET未识别CME58严格, matches: '^\r\n\+CME ERROR: 58\r\n$' }
      - { name: TCPSET非参数错误53, not_contains: "+CME ERROR: 53" }

  # 指令名不完整（IPSTATU≠IPSTATUS）→ 未识别
  - command: 'AT+IPSTATU'
    assert:
      - { name: IPSTATU未识别CME58严格, matches: '^\r\n\+CME ERROR: 58\r\n$' }

  # 6.18 PDPSTATUS 执行命令 —— 精确业务码 \r\n+PDPSTATUS: DISCONNECT\r\n
  - command: 'AT+PDPSTATUS'
    timeout: 1.2
    extract:
      pdp_st: '\+PDPSTATUS:\s*(\w+(?:\s+\w+)*)'
    assert:
      - { name: PDPSTATUS严格格式, matches: '^\r\n\+PDPSTATUS: (?:CONNECT|DISCONNECT|PSEUDO CONNECT|PSEUDO)\r\n$' }

teardown:
  - command: ATE0
