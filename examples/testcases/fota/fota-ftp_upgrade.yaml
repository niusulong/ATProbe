name: FOTA-FTP升级-A到B
description: FOTA over FTP 升级验证（跨组引用：ftp 传输 + fota 包信息）
tags: [fota, network, p1]
port: COM3

steps:
  # 引用 ftp 组（传输服务器）+ fota 组（包信息，跨组）
  - command: 'AT+QFTPURL="{{ftp.host}}",{{ftp.port}}'
    assert: { contains: "OK" }
  - command: 'AT+QFTPUSER="{{ftp.user}}","{{ftp.password}}"'
    assert: { contains: "OK" }
  - command: 'AT+QFOTAPKG="{{fota.pkg_ab}}"'
    assert: { contains: "OK" }
  # 升级前版本校验
  - command: AT+QFWVER?
    extract:
      cur_ver: 'FWVER:\s*(\S+)'
    assert:
      - { name: 升级前版本, var: cur_ver, op: eq, value: "{{fota.version_a}}" }
